services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: store
      MYSQL_USER: voxel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - platform

  localstack:
    image: localstack/localstack:4.4.0
    environment:
      SERVICES: sns,sqs
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: "1"
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - platform

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - platform

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/voxel-cache;
      "
    networks:
      - platform

  backend:
    build:
      context: .
      dockerfile: platform/backend/docker/Dockerfile
    working_dir: /var/www/html
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      EVENT_BUS_SERVER_ORDERS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:server-orders
      EVENT_BUS_SERVER_LIFECYCLE_QUEUE_URL: http://localstack:4566/000000000000/server-lifecycle-backend
      LOCATIONS_CACHE_DISK: locations_cache
      LOCATIONS_CACHE_PATH: locations.json
      LOCATIONS_CACHE_TTL_SECONDS: 60
      LOCATIONS_CACHE_DRIVER: s3
      LOCATIONS_CACHE_AWS_ACCESS_KEY_ID: minioadmin
      LOCATIONS_CACHE_AWS_SECRET_ACCESS_KEY: minioadmin
      LOCATIONS_CACHE_AWS_DEFAULT_REGION: us-east-1
      LOCATIONS_CACHE_AWS_BUCKET: voxel-cache
      LOCATIONS_CACHE_AWS_ENDPOINT: http://minio:9000
      LOCATIONS_CACHE_AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./platform/backend:/var/www/html
      - ./packages:/var/packages:ro
      - backend_vendor:/var/www/html/vendor
    command: ["web"]
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.localhost`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=8000
    networks:
      - platform

  backend-worker:
    build:
      context: .
      dockerfile: platform/backend/docker/Dockerfile
    working_dir: /var/www/html
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      EVENT_BUS_SERVER_ORDERS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:server-orders
      EVENT_BUS_SERVER_LIFECYCLE_QUEUE_URL: http://localstack:4566/000000000000/server-lifecycle-backend
      LOCATIONS_CACHE_DISK: locations_cache
      LOCATIONS_CACHE_PATH: locations.json
      LOCATIONS_CACHE_TTL_SECONDS: 60
      LOCATIONS_CACHE_DRIVER: s3
      LOCATIONS_CACHE_AWS_ACCESS_KEY_ID: minioadmin
      LOCATIONS_CACHE_AWS_SECRET_ACCESS_KEY: minioadmin
      LOCATIONS_CACHE_AWS_DEFAULT_REGION: us-east-1
      LOCATIONS_CACHE_AWS_BUCKET: voxel-cache
      LOCATIONS_CACHE_AWS_ENDPOINT: http://minio:9000
      LOCATIONS_CACHE_AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./platform/backend:/var/www/html
      - ./packages:/var/packages:ro
      - backend_vendor:/var/www/html/vendor
    command: ["worker"]
    depends_on:
      - backend
      - localstack
      - minio-create-bucket
    networks:
      - platform

  backend-event-consumer:
    build:
      context: .
      dockerfile: platform/backend/docker/Dockerfile
    working_dir: /var/www/html
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      EVENT_BUS_SERVER_ORDERS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:server-orders
      EVENT_BUS_SERVER_LIFECYCLE_QUEUE_URL: http://localstack:4566/000000000000/server-lifecycle-backend
      LOCATIONS_CACHE_DISK: locations_cache
      LOCATIONS_CACHE_PATH: locations.json
      LOCATIONS_CACHE_TTL_SECONDS: 60
      LOCATIONS_CACHE_DRIVER: s3
      LOCATIONS_CACHE_AWS_ACCESS_KEY_ID: minioadmin
      LOCATIONS_CACHE_AWS_SECRET_ACCESS_KEY: minioadmin
      LOCATIONS_CACHE_AWS_DEFAULT_REGION: us-east-1
      LOCATIONS_CACHE_AWS_BUCKET: voxel-cache
      LOCATIONS_CACHE_AWS_ENDPOINT: http://minio:9000
      LOCATIONS_CACHE_AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./platform/backend:/var/www/html
      - ./packages:/var/packages:ro
      - backend_vendor:/var/www/html/vendor
    command: ["event-consumer"]
    depends_on:
      - backend
      - localstack
      - minio-create-bucket
    networks:
      - platform

  orchestrator:
    build:
      context: .
      dockerfile: platform/orchestrator/docker/Dockerfile
    working_dir: /var/www/html
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      EVENT_BUS_SERVER_ORDERS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:server-orders
      EVENT_BUS_SERVER_ORDERS_QUEUE_URL: http://localstack:4566/000000000000/server-orders-orchestrator
      LOCATIONS_CACHE_DISK: locations_cache
      LOCATIONS_CACHE_PATH: locations.json
      LOCATIONS_CACHE_DRIVER: s3
      LOCATIONS_CACHE_AWS_ACCESS_KEY_ID: minioadmin
      LOCATIONS_CACHE_AWS_SECRET_ACCESS_KEY: minioadmin
      LOCATIONS_CACHE_AWS_DEFAULT_REGION: us-east-1
      LOCATIONS_CACHE_AWS_BUCKET: voxel-cache
      LOCATIONS_CACHE_AWS_ENDPOINT: http://minio:9000
      LOCATIONS_CACHE_AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./platform/orchestrator:/var/www/html
      - ./packages:/var/packages:ro
      - orchestrator_vendor:/var/www/html/vendor
    command: ["web"]
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.orchestrator.rule=Host(`orchestrator.localhost`)
      - traefik.http.routers.orchestrator.entrypoints=web
      - traefik.http.services.orchestrator.loadbalancer.server.port=8000
    networks:
      - platform

  orchestrator-worker:
    build:
      context: .
      dockerfile: platform/orchestrator/docker/Dockerfile
    working_dir: /var/www/html
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      EVENT_BUS_SERVER_ORDERS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:server-orders
      EVENT_BUS_SERVER_ORDERS_QUEUE_URL: http://localstack:4566/000000000000/server-orders-orchestrator
      LOCATIONS_CACHE_DISK: locations_cache
      LOCATIONS_CACHE_PATH: locations.json
      LOCATIONS_CACHE_DRIVER: s3
      LOCATIONS_CACHE_AWS_ACCESS_KEY_ID: minioadmin
      LOCATIONS_CACHE_AWS_SECRET_ACCESS_KEY: minioadmin
      LOCATIONS_CACHE_AWS_DEFAULT_REGION: us-east-1
      LOCATIONS_CACHE_AWS_BUCKET: voxel-cache
      LOCATIONS_CACHE_AWS_ENDPOINT: http://minio:9000
      LOCATIONS_CACHE_AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./platform/orchestrator:/var/www/html
      - ./packages:/var/packages:ro
      - orchestrator_vendor:/var/www/html/vendor
    command: ["event-consumer"]
    depends_on:
      - orchestrator
      - localstack
      - minio-create-bucket
    networks:
      - platform

  frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HMR_HOST: store.localhost
      VITE_HMR_CLIENT_PORT: "80"
    volumes:
      - ./platform/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"
    expose:
      - "5173"
    labels:
      - traefik.enable=true
      - traefik.http.routers.store.rule=Host(`store.localhost`)
      - traefik.http.routers.store.entrypoints=web
      - traefik.http.services.store.loadbalancer.server.port=5173
      # Component storybook (same Vite server, subdomain-routed)
      - traefik.http.routers.storybook.rule=Host(`storybook.localhost`)
      - traefik.http.routers.storybook.entrypoints=web
      - traefik.http.routers.storybook.service=store
    networks:
      - platform

  orchestrator-frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HMR_HOST: admin.localhost
      VITE_HMR_CLIENT_PORT: "80"
    volumes:
      - ./platform/orchestrator_frontend:/app
      - orchestrator_frontend_node_modules:/app/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5174 --strictPort"
    expose:
      - "5174"
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin.rule=Host(`admin.localhost`)
      - traefik.http.routers.admin.entrypoints=web
      - traefik.http.services.admin.loadbalancer.server.port=5174
    networks:
      - platform

  legacy:
    build:
      context: .
      dockerfile: platform_legacy/docker/dev/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./platform_legacy:/var/www/html
      - legacy_vendor:/var/www/html/vendor
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.legacy.rule=Host(`legacy.localhost`)
      - traefik.http.routers.legacy.entrypoints=web
      - traefik.http.services.legacy.loadbalancer.server.port=8080
    networks:
      - platform

  pterodactyl-panel:
    image: ghcr.io/pterodactyl/panel:latest
    entrypoint:
      - /bin/ash
      - -lc
      - |
        if ! command -v mysql >/dev/null 2>&1; then
          apk add --no-cache mysql-client >/dev/null
        fi
        printf "[client]\nskip-ssl\n" > /root/.my.cnf
        chmod 600 /root/.my.cnf
        exec /bin/ash .github/docker/entrypoint.sh supervisord -n -c /etc/supervisord.conf
    environment:
      APP_URL: http://panel.localhost
      APP_TIMEZONE: UTC
      APP_SERVICE_AUTHOR: noreply@localhost
      TRUSTED_PROXIES: "*"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: pterodactyl
      DB_USERNAME: pterodactyl
      DB_PASSWORD: secret
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: noreply@localhost
      MAIL_FROM_NAME: Pterodactyl Panel
    volumes:
      - pterodactyl_panel_var:/app/var
      - pterodactyl_panel_logs:/app/storage/logs
    expose:
      - "80"
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.panel.rule=Host(`panel.localhost`)
      - traefik.http.routers.panel.entrypoints=web
      - traefik.http.services.panel.loadbalancer.server.port=80
    networks:
      - platform

  pterodactyl-wings:
    image: ghcr.io/pterodactyl/wings:latest
    profiles:
      - testing
    restart: unless-stopped
    tty: true
    environment:
      TZ: UTC
      WINGS_UID: 988
      WINGS_GID: 988
      WINGS_USERNAME: pterodactyl
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/wings/config.yml:/etc/pterodactyl/config.yml:ro
      - /tmp/pterodactyl:/tmp/pterodactyl
      - /tmp/pterodactyl-logs:/tmp/pterodactyl-logs
      - /tmp/pterodactyl-tmp:/tmp/pterodactyl-tmp
    ports:
      - "8080:8080"
      - "2022:2022"
    depends_on:
      - pterodactyl-panel
    networks:
      - platform

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: secret
    expose:
      - "80"
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.pma.rule=Host(`pma.localhost`)
      - traefik.http.routers.pma.entrypoints=web
      - traefik.http.services.pma.loadbalancer.server.port=80
    networks:
      - platform

  traefik:
    image: traefik:latest
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    depends_on:
      - backend
      - orchestrator
      - frontend
      - orchestrator-frontend
      - legacy
      - pterodactyl-panel
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - platform

networks:
  platform:

volumes:
  mysql_data:
  localstack_data:
  minio_data:
  backend_vendor:
  orchestrator_vendor:
  frontend_node_modules:
  orchestrator_frontend_node_modules:
  legacy_vendor:
  pterodactyl_panel_var:
  pterodactyl_panel_logs:
